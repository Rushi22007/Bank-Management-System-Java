# WhatsApp Configuration for Bank Management System (via Twilio)
# Configure your Twilio WhatsApp settings here

# Twilio Account Credentials
# Get these from: https://console.twilio.com/
twilio.account.sid=YOUR_TWILIO_ACCOUNT_SID
twilio.auth.token=YOUR_TWILIO_AUTH_TOKEN

# WhatsApp Numbers
# Twilio WhatsApp Sandbox number (for testing): whatsapp:+14155238886
# Your verified number (for production): whatsapp:+1234567890
twilio.whatsapp.from=whatsapp:+14155238886

# Recipient WhatsApp Number (with country code, e.g., +919876543210)
# Format: whatsapp:+[country_code][phone_number]
whatsapp.recipient.number=whatsapp:+YOUR_PHONE_NUMBER

# WhatsApp Messaging Settings
whatsapp.enabled=true
whatsapp.send.pdf=true
whatsapp.send.summary=true

# Message Templates
whatsapp.template.header=🏦 *Bank Management System*
whatsapp.template.footer=_Automated System Message_

# SETUP INSTRUCTIONS:
# ====================
# 1. Create a Twilio account at https://www.twilio.com/
# 2. Get your Account SID and Auth Token from the console
# 3. For TESTING: Use Twilio WhatsApp Sandbox
#    - Go to: https://console.twilio.com/us1/develop/sms/try-it-out/whatsapp-learn
#    - Send "join [your-sandbox-code]" to the sandbox number from your WhatsApp
# 4. For PRODUCTION: Request WhatsApp Business API access
# 5. Update the values above with your credentials
# 6. Update recipient number with your WhatsApp number (include country code)
